{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "todo-chat-bot.fullname" . }}-backend-secret
  labels:
    {{- include "todo-chat-bot.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.backend.secrets.databaseUrl | quote }}
  JWT_SECRET: {{ .Values.backend.secrets.jwtSecret | quote }}
  BETTER_AUTH_SECRET: {{ .Values.backend.secrets.betterAuthSecret | quote }}
  OPENAI_API_KEY: {{ .Values.backend.secrets.openaiApiKey | quote }}
{{- end }}
